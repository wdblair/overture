name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Building the [test] stage compiles the Overture compiler and
      # runs the full harness (typechecking positives/negatives plus
      # end-to-end codegen: generate, compile with patscc, run,
      # golden-check). The ATS2 toolchain layer is cached, so runs
      # after the first only rebuild Overture itself.
      - name: Build and test
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
